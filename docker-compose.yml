services:
  postgres:
    image: postgres:15
    container_name: pro-postgres-1
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: pro-app-1
    restart: always

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres

    ports:
      - "3000:3000"

    # 🔥 КЛЮЧ: единый storage на хосте
    volumes:
      - /home/dev/pro/uploads:/app/uploads

    env_file:
      - .env

    command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
  postgres_data: