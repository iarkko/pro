services:
  postgres:
    image: postgres:15
    container_name: pro-postgres-1
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: pro-app-1
    restart: always

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres

    ports:
      - "3000:3000"

    command: npm run start

    # 🔥 ВАЖНО: чтобы Prisma не ломался на старых build'ах
    env_file:
      - .env

volumes:
  postgres_data: